<div class="min-h-screen bg-neutral-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white p-10 border border-neutral-200 shadow-sm">

    <div class="mb-10">
      <h1 class="text-3xl font-bold tracking-tight text-neutral-900 mb-2">HospitalSystem</h1>
      <p class="text-neutral-500 text-sm">Ingrese sus credenciales operativas.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

      <div class="space-y-2">
        <label for="username" class="block text-sm font-bold text-neutral-900 uppercase tracking-wider">
          Usuario
        </label>
        <input
          id="username"
          type="text"
          formControlName="username"
          class="w-full px-4 py-3 border border-neutral-300 focus:border-neutral-900 focus:ring-0 outline-none transition-colors text-neutral-900 placeholder-neutral-400 bg-neutral-50 focus:bg-white"
          placeholder="Ej: admin"
        />
      </div>

      <div class="space-y-2">
        <label for="password" class="block text-sm font-bold text-neutral-900 uppercase tracking-wider">
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full px-4 py-3 border border-neutral-300 focus:border-neutral-900 focus:ring-0 outline-none transition-colors text-neutral-900 placeholder-neutral-400 bg-neutral-50 focus:bg-white"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full bg-neutral-900 text-white font-bold py-4 mt-6 tracking-widest uppercase hover:bg-neutral-800 disabled:bg-neutral-300 disabled:cursor-not-allowed transition-colors"
      >
        @if (isLoading) {
          Autenticando...
        } @else {
          Iniciar Sesión
        }
      </button>

    </form>
  </div>
</div>
